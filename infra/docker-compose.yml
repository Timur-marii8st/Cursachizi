version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: courseforge
      POSTGRES_USER: courseforge
      POSTGRES_PASSWORD: courseforge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courseforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible storage) ───────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ── Backend API ─────────────────────────────────────────
  backend:
    build:
      context: ../
      dockerfile: infra/docker/Dockerfile.backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://courseforge:courseforge@postgres:5432/courseforge
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # ── Pipeline Worker ─────────────────────────────────────
  worker:
    build:
      context: ../
      dockerfile: infra/docker/Dockerfile.worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://courseforge:courseforge@postgres:5432/courseforge
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Telegram Bot ────────────────────────────────────────
  bot:
    build:
      context: ../
      dockerfile: infra/docker/Dockerfile.bot
    env_file:
      - ../.env
    environment:
      API_BASE_URL: http://nginx
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - nginx

volumes:
  postgres_data:
  redis_data:
  minio_data:
